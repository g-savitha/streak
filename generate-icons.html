<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate Streak Icons</title>
<style>
  body { background: #111; color: #f5f5f5; font-family: system-ui; padding: 30px; }
  canvas { display: block; margin: 10px 0; }
  a { color: #f97316; display: block; margin: 6px 0; font-size: 13px; }
  h2 { color: #f97316; margin-top: 20px; }
</style>
</head>
<body>
<h1>Streak Icon Generator</h1>
<p>Click the links to download each icon, then place them in <code>icons/</code></p>

<script>
function makeIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background circle
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
  ctx.fill();

  // Fire emoji
  ctx.font = `${size * 0.65}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🔥', size/2, size/2 + size*0.04);

  return canvas;
}

const sizes = [16, 48, 128];
sizes.forEach(size => {
  const canvas = makeIcon(size);
  document.body.appendChild(document.createElement('h2')).textContent = size + 'x' + size;
  document.body.appendChild(canvas);

  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = `icon${size}.png`;
  link.textContent = `⬇ Download icon${size}.png`;
  document.body.appendChild(link);
});
</script>
</body>
</html>
