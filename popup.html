<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hustler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <canvas id="confettiCanvas" aria-hidden="true"></canvas>

  <div class="app" role="main">

    <!-- Celebration banner -->
    <div class="celebration-banner" id="celebrationBanner" aria-live="polite" aria-hidden="true"></div>

    <!-- Header -->
    <header class="header">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode" title="Toggle theme">
        <span id="themeIcon">🌙</span>
      </button>
      <div class="app-name" aria-hidden="true">hustler</div>
      <div class="streak-display" aria-label="Current streak">
        <span class="streak-fire" aria-hidden="true">🔥</span>
        <span class="streak-count" id="currentStreak" aria-live="polite">0</span>
      </div>
      <div class="streak-label">day streak</div>
    </header>

    <!-- Daily quote bar -->
    <div class="quote-bar" id="quoteBar" aria-label="Daily quote">
      <span class="quote-text" id="quoteText"></span>
    </div>

    <!-- Category tabs -->
    <div class="category-tabs" id="categoryTabs" role="group" aria-label="Habit categories"></div>

    <!-- Stats bar -->
    <div class="stats-bar" role="region" aria-label="All-time stats">
      <div class="stat">
        <span class="stat-label">Longest</span>
        <span class="stat-value" id="longestStreak" aria-live="polite">0 days</span>
      </div>
      <div class="stat-divider" aria-hidden="true"></div>
      <div class="stat">
        <span class="stat-label">Total</span>
        <span class="stat-value" id="totalDays" aria-live="polite">0 days</span>
      </div>
    </div>

    <!-- View toggle -->
    <div class="view-toggle" role="group" aria-label="Calendar view">
      <button class="toggle-btn active" id="btnMonthly" data-view="monthly" aria-pressed="true">Monthly</button>
      <button class="toggle-btn" id="btnYearly" data-view="yearly" aria-pressed="false">Yearly</button>
    </div>

    <!-- Calendar area -->
    <div class="calendar-area" id="calendarArea" role="region" aria-label="Calendar">

      <!-- Monthly view -->
      <div class="monthly-view" id="monthlyView" role="grid" aria-label="Monthly calendar">
        <div class="month-nav">
          <button class="nav-arrow" id="prevMonth" aria-label="Previous month">&#8249;</button>
          <span class="month-title" id="monthTitle" aria-live="polite">May 2026</span>
          <button class="nav-arrow" id="nextMonth" aria-label="Next month">&#8250;</button>
        </div>
        <div class="day-headers" role="row" aria-hidden="true">
          <span>Mon</span><span>Tue</span><span>Wed</span>
          <span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
        </div>
        <div class="month-grid" id="monthGrid"></div>
      </div>

      <!-- Yearly view -->
      <div class="yearly-view hidden" id="yearlyView" role="region" aria-label="Yearly heatmap">
        <div class="year-nav">
          <button class="nav-arrow" id="prevYear" aria-label="Previous year">&#8249;</button>
          <span class="year-title" id="yearTitle" aria-live="polite">2026</span>
          <button class="nav-arrow" id="nextYear" aria-label="Next year">&#8250;</button>
          <div class="share-actions">
            <button class="share-btn" id="shareDownloadBtn" title="Download streak card as PNG" aria-label="Download streak card">↓ Save</button>
            <button class="share-btn share-copy" id="shareCopyBtn" title="Copy streak card to clipboard" aria-label="Copy streak card">📋 Copy</button>
          </div>
        </div>
        <div class="year-grid-wrapper">
          <div class="month-labels" id="monthLabels" aria-hidden="true"></div>
          <div class="year-grid" id="yearGrid"></div>
        </div>
      </div>

    </div>

    <!-- Mark Today section -->
    <div class="mark-section" id="markSection">
      <button class="mark-btn" id="markBtn" aria-label="Mark today as complete">Mark Today</button>

      <!-- Initial note (first-time mark) -->
      <div class="note-input-area hidden" id="noteInputArea" role="form" aria-label="Add a note">
        <textarea class="note-input" id="noteInput"
                  placeholder="What did you do today? (optional)"
                  maxlength="200" rows="2" aria-label="Note"></textarea>
        <div class="note-actions">
          <button class="note-cancel" id="noteCancel" type="button">Cancel</button>
          <button class="note-confirm" id="noteConfirm" type="button" aria-label="Save and mark today as complete">Save ✓</button>
        </div>
      </div>

      <!-- Entry list (shown after logging) -->
      <div class="entry-list hidden" id="entryList" aria-label="Today's notes"></div>

      <!-- Add note button + panel (shown when today is already logged) -->
      <button class="add-note-btn hidden" id="addNoteBtn" type="button" aria-label="Add another note">+ Add note</button>
      <div class="add-note-area hidden" id="addNoteArea" role="form" aria-label="Add another note">
        <textarea class="note-input" id="addNoteInput"
                  placeholder="Add another note…"
                  maxlength="200" rows="2" aria-label="Additional note"></textarea>
        <div class="note-actions">
          <button class="note-cancel" id="addNoteCancel" type="button">Cancel</button>
          <button class="note-confirm" id="addNoteConfirm" type="button">Save ✓</button>
        </div>
      </div>
    </div>

    <!-- Friend challenge section -->
    <div class="challenge-section" id="challengeSection" aria-label="Friend challenge">

      <button class="challenge-toggle" id="challengeToggle" aria-expanded="false">
        <span class="challenge-toggle-icon">⚔️</span>
        Challenge a Friend
        <span class="challenge-caret" aria-hidden="true">›</span>
      </button>

      <div class="challenge-body hidden" id="challengeBody">

        <!-- Saved friends panel (up to 3 friends) -->
        <div class="saved-friends-panel hidden" id="savedFriendsPanel"></div>

        <!-- Tab switcher -->
        <div class="challenge-tabs" role="tablist">
          <button class="challenge-tab active" id="tabYourCode" role="tab" aria-selected="true" data-tab="your-code">Your Code</button>
          <button class="challenge-tab" id="tabEnterCode" role="tab" aria-selected="false" data-tab="enter-code">Enter a Code</button>
        </div>

        <!-- Tab: Your Code -->
        <div class="challenge-panel" id="panelYourCode" role="tabpanel">
          <p class="challenge-hint">Share this code with a friend — they paste it to compare streaks. Code stays fresh for 7 days.</p>
          <div class="challenge-name-row">
            <input type="text" class="challenge-input" id="userName"
                   placeholder="Your name (optional)" maxlength="30" aria-label="Your display name" />
          </div>
          <div class="challenge-code-row">
            <input type="text" class="challenge-code-field" id="generatedCode" readonly aria-label="Your challenge code" />
            <button class="challenge-copy-btn" id="copyCodeBtn" aria-label="Copy code">Copy</button>
          </div>
        </div>

        <!-- Tab: Enter a Code -->
        <div class="challenge-panel hidden" id="panelEnterCode" role="tabpanel">
          <p class="challenge-hint">Paste a friend's code to compare streaks.</p>
          <div class="challenge-code-row">
            <input type="text" class="challenge-input" id="friendCodeInput"
                   placeholder="Paste code here…" aria-label="Friend's challenge code" />
            <button class="challenge-compare-btn" id="compareBtn" aria-label="Compare streaks">Go</button>
          </div>
          <div class="challenge-result" id="challengeResult"></div>
        </div>

      </div>
    </div>

  </div><!-- /.app -->

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip" role="tooltip" aria-hidden="true"></div>

  <!-- Add Category Modal -->
  <div class="modal-overlay hidden" id="addCategoryModal" role="dialog" aria-modal="true" aria-label="Add habit category">
    <div class="modal-box">
      <h2 class="modal-title">New Habit</h2>
      <div class="modal-field">
        <label class="modal-label" for="newCatName">Name</label>
        <input type="text" class="modal-input" id="newCatName" placeholder="e.g. Workout" maxlength="30" />
      </div>
      <div class="modal-field">
        <label class="modal-label">Emoji</label>
        <div class="emoji-picker" id="emojiPicker"></div>
        <span class="selected-emoji" id="newCatEmoji">📚</span>
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" id="addCatCancel" type="button">Cancel</button>
        <button class="modal-confirm" id="addCatConfirm" type="button">Add Habit</button>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
